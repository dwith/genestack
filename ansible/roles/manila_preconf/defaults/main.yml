#export MANILA_USER_AUTHORIZED_KEYS="${TMP_DIR}/manila-service-image-build/manila-image-elements/manila-service-keypair.pub"
#export MANILA_IMG_NAME='RS_manila_service_image'
#export DHCP_TIMEOUT=900
manila_ssh_key_name: manila-ssh-key #manila-service-keypair?
manila_flavor_name: m1.manila
manila_image_version: noble
manila_image_name: manila-ubuntu-{{ manila_image_version }}
#manila_image_url: "https://tarballs.opendev.org/openstack/octavia/test-images/test-only-manila-x64-haproxy-ubuntu-{{ manila_image_version }}.qcow2"

# these are the defaults for certs
#octavia_create_certs: true
#octavia_certs_dir: "{{ lookup('env', 'HOME') }}/octavia_certs"
manila_tmp_dir: "{{ lookup('env', 'HOME') }}/manila"
