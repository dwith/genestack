    interface: public
  register: manila_tenant_secgroup_r_icmp
  until: manila_tenant_secgroup_r_icmp is success
  retries: 5
  delay: 5

- name: Create Security group rule to allow ssh traffic for Manila
  openstack.cloud.security_group_rule:
