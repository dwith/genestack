---
# These are the tasks to create the security
# groups for Manila as well as health
# manager ports; manila security group includes
# rules for allowing traffic on ports:
# 22
# 111
# 662
# 2049
# 4045
# 20048
# icmp
# health manager secgroup
# only allows traffic on port 5555
#
- name: Create security group for Manila service
  openstack.cloud.security_group:
    name: "{{ manila_service_secgroup_name }}"
    state: present
    description: "security group for Manila"
    interface: public
  register: create_manila_service_secgroup
  until: create_manila_service_secgroup is success
  retries: 5
  delay: 5

- name: Create Security group rule to allow icmp traffic for Manila service
  openstack.cloud.security_group_rule:
    security_group: "{{ create_manila_service_secgroup.security_group.id }}"
    state: present
    protocol: icmp
    remote_ip_prefix: "{{ manila_service_subnet_cidr }}"
    interface: public
  register: manila_service_secgroup_r_icmp
  until: manila_service_secgroup_r_icmp is success
  retries: 5
  delay: 5
  when: manila_icmp_enabled

- name: Create Security group rule to allow ssh traffic for Manila service
  openstack.cloud.security_group_rule:
    security_group: "{{ create_manila_service_secgroup.security_group.id }}"
    state: present
    protocol: tcp
    port_range_min: 22
    port_range_max: 22
    remote_ip_prefix: "{{ manila_service_subnet_cidr }}"
    interface: public
  register: manila_service_secgroup_r_22
  until: manila_service_secgroup_r_22 is success
  retries: 5
  delay: 5
  when: manila_ssh_enabled

- name: Create security group for Manila Tenants
  openstack.cloud.security_group:
    name: "{{ manila_tenant_secgroup_name }}"
    state: present
    description: "security group for Manila Tenants"
    interface: public
  register: create_manila_tenant_secgroup
  until: create_manila_tenant_secgroup is success
  retries: 5
  delay: 5

- name: Create Security group rule to allow icmp traffic for Manila Tenants
